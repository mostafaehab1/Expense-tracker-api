# Local dev stack: the API + a MongoDB instance.
# Usage: `docker compose up --build` then hit http://localhost:4000/docs
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      # Service name `mongo` resolves on the compose network.
      MONGODB_URI: mongodb://mongo:27017/expense_tracker
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_to_a_long_random_secret}
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
